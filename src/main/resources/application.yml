server:
  port: 8090

spring:
  datasource:
    url: jdbc:h2:file:./data/orchestrator
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  h2:
    console:
      enabled: true
      path: /h2

orchestrator:
  # container engine binary used to provision per-job containers
  engine: podman
  # max jobs running concurrently
  max-concurrency: 3
  # how often the scheduler polls the queue (ms)
  poll-interval-ms: 1500
  # default per-job resource limits (overridable per job)
  default-cpus: "1.0"
  default-memory: "256m"
  # retry backoff base (seconds); attempt n waits base * 2^(n-1)
  backoff-base-seconds: 5
